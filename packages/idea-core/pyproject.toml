[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "idea-core"
version = "0.1.0"
description = "Retiring internal Python reference engine for idea-engine parity"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "jsonschema>=4.22.0,<5",
  "jcs>=0.2.1,<1",
  "filelock>=3.16.0,<4",
  "referencing>=0.35.0,<1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2.0,<9",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
