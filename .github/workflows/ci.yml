name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install uv
        run: python3 -m pip install uv

      - run: pnpm install --frozen-lockfile

      - name: Check shell boundary anti-drift
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-shell-boundary-anti-drift.mjs

      - run: pnpm -r build

      - run: pnpm --filter @autoresearch/hep-mcp docs:tool-counts:check

      - run: pnpm -r lint

      - run: pnpm -r test

      - run: make contract-test

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TS dependencies for source-run orchestrator paths
        run: |
          pnpm --filter @autoresearch/rep-sdk build
          pnpm --filter @autoresearch/literature-workflows... build

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Python tests (hep-autoresearch)
        run: |
          cd packages/hep-autoresearch
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            pip install -e ../project-contracts
            pip install -e ".[dev]" 2>/dev/null || pip install -e .
            pip install pytest
            if [ -d tests ] && find tests -name 'test_*.py' | head -1 | grep -q .; then
              python -m pytest tests/ -q
            else
              echo "No test files found, skipping"
            fi
          else
            echo "No Python package found, skipping"
          fi
