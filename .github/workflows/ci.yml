name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install uv + Python codegen tools
        run: python3 -m pip install uv datamodel-code-generator ruff

      - run: pnpm install --frozen-lockfile

      - name: Check shell boundary anti-drift
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-shell-boundary-anti-drift.mjs

      - name: Check governance sync (AGENTS.md ↔ CLAUDE.md)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-governance-sync.mjs

      - name: Check codegen drift (meta/schemas ↔ generated)
        if: ${{ matrix.node-version == 22 }}
        run: pnpm codegen:check

      - run: pnpm -r build

      - run: pnpm --filter @autoresearch/hep-mcp docs:tool-counts:check

      - run: pnpm -r lint

      - run: pnpm -r test

      - run: make contract-test

  python-contracts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Python tests (project contracts)
        run: |
          python -m pip install pytest
          python -m pytest packages/project-contracts/tests -q
